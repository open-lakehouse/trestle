# Unity Catalog server — contributed by the `local-stack-unity-catalog` component.
#
# By default this uses the upstream Java implementation
# (`unitycatalog/unitycatalog`). To swap in the Rust implementation while it
# remains pre-release, set `UC_IMAGE=unitycatalog-rs:dev` in `.env.local` and
# adjust the `command:` to `["server", "--rest", "--use-db"]`.
services:
  unitycatalog:
    image: ${UC_IMAGE:-unitycatalog/unitycatalog:latest}
    restart: unless-stopped
    profiles: [svc, full]
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${UC_DATABASE_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-seaweedfs}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-seaweedfs}
      AWS_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      S3_ENDPOINT: http://seaweedfs:8333
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/2.1/unity-catalog/catalogs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s