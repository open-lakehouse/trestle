# MLflow tracking server — contributed by the `local-stack-mlflow` component.
# Always runs with --static-prefix /mlflow so it sits cleanly behind Envoy.
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1-full
    restart: unless-stopped
    profiles: [svc, full]
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
    command:
      - "mlflow"
      - "server"
      - "--backend-store-uri"
      - "${MLFLOW_BACKEND_STORE_URI}"
      - "--artifacts-destination"
      - "${MLFLOW_ARTIFACTS_DESTINATION}"
      - "--serve-artifacts"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
      - "--static-prefix"
      - "/mlflow"
    environment:
      # MLFLOW_S3_ENDPOINT_URL is the object_store `endpoint` coordinate the planner injected
      # (the in-network address of the chosen provider). The AWS_* credentials come from the
      # chosen S3 provider's own env contribution, so they fall back when an S3 provider backs
      # the bucket; with an Azure provider they are simply absent.
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-seaweedfs}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-seaweedfs}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    expose:
      - "5000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/mlflow/health')\""
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s