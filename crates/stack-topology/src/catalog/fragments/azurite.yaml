# Azurite (Azure Blob emulator) — object-store provider, an alternative to SeaweedFS.
# A one-shot init creates the container(s) demanded by the stack; the list is rendered
# from the aggregated object-store demands at plan time.
services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    restart: unless-stopped
    profiles: [svc, full]
    command:
      ["azurite-blob", "--blobHost", "0.0.0.0", "--blobPort", "10000", "--skipApiVersionCheck"]
    ports:
      - "${AZURITE_BLOB_PORT:-10000}:10000"
    volumes:
      - ./.data/azurite:/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "nc -z 127.0.0.1 10000 || exit 1"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 3s

  azurite-init:
    image: mcr.microsoft.com/azure-cli:2.87.0
    restart: "no"
    profiles: [svc, full]
    depends_on:
      azurite:
        condition: service_healthy
    environment:
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
    entrypoint:
      - "sh"
      - "-c"
      - |
        echo "Creating Azurite containers...";
${AZURE_CONTAINER_CREATE_LINES}        echo "Containers ready.";
