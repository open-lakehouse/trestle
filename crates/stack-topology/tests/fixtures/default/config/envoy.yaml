# Envoy front-edge config, rendered from aggregated component contributions.
# Route ordering matters: more-specific prefixes must come before less-specific
# ones, so component-provided routes are emitted first and the default app
# route (if any) is emitted last.

static_resources:
  listeners:
    - name: gateway
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                use_remote_address: true
                upgrade_configs:
                  - upgrade_type: websocket
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: all
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/api/2.1/unity-catalog" }
                          route:
                            cluster: unity_catalog
                        - match: { prefix: "/unity-catalog" }
                          route:
                            cluster: unity_catalog
                        - match: { prefix: "/api/2.0/mlflow" }
                          route:
                            cluster: mlflow
                            regex_rewrite:
                              pattern:
                                google_re2: {}
                                regex: "^/api/2.0/mlflow(.*)$"
                              substitution: "/mlflow/api/2.0/mlflow\\1"
                        - match: { prefix: "/api/2.0/otel" }
                          route:
                            cluster: mlflow
                        - match: { prefix: "/mlflow" }
                          route:
                            cluster: mlflow
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: unity_catalog
      type: STRICT_DNS
      connect_timeout: 2s
      load_assignment:
        cluster_name: unity_catalog
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: unitycatalog
                      port_value: 8080
    - name: mlflow
      type: STRICT_DNS
      connect_timeout: 2s
      load_assignment:
        cluster_name: mlflow
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: mlflow
                      port_value: 5000

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }