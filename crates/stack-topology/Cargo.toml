[package]
name = "olai-stack-topology"
description = "Role-, placement-, and gateway-aware addressing model for Lakehouse reference-architecture environments"
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
homepage.workspace = true
# Crate-local keywords: the workspace defaults (protobuf, codegen, …) describe
# the codegen crates, not this pure topology/addressing model.
keywords = ["lakehouse", "topology", "docker-compose", "service-discovery"]

[features]
# Off by default: keeps the pure core free of YAML parsing. Enables building a
# catalog from on-disk `module.yaml` manifests (`Catalog::from_manifests`).
default = []
catalog = ["dep:serde_yaml"]

[dependencies]
# workspace dependencies (in alphabetical order)
serde = { workspace = true }
serde_yaml = { workspace = true, optional = true }
thiserror = { workspace = true }
url = { workspace = true }
