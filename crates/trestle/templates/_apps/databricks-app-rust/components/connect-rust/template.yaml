name: connect-rust
version: 0.1.0
description: |
  buf ConnectRPC server facade served alongside REST on the same port. Adds the
  Connect handler adapter (`handlers/greeting_connect.rs`) that delegates to the
  shared `GreetingCore`. The rest of the wiring — the connect buf-gen plugins,
  the `connectrpc`/`http-body` deps, and the same-port serve in `main.rs` — is in
  the app template, guarded by `with_connect`.

  Requires the buffa runtime (forced on when selected). The Connect facade is
  generated by the remote `buf.build/anthropics/connect-rust` plugin; only the
  local `protoc-gen-buffa-packaging` plugin needs installing.

provides: {}
