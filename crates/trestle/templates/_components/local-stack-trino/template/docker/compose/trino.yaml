# Trino single-node coordinator/worker. Contributed by the `local-stack-trino`
# component. The image tag is pinned to a known-good version; override via
# `TRINO_IMAGE` in `.env.local` if you want a different release.
services:
  trino:
    image: ${TRINO_IMAGE:-trinodb/trino:latest}
    profiles: [svc, trino]
    ports:
      - "${TRINO_PORT:-8080}:8080"
    environment:
      # Standard S3 credentials shared with the rest of the stack; the
      # SeaweedFS component sets these in `.env.example`.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-seaweedfs}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-seaweedfs}
      AWS_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 30
