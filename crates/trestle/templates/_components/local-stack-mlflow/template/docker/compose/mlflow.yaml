# MLflow tracking server — contributed by the `local-stack-mlflow` component.
# Always runs with --static-prefix /mlflow so it sits cleanly behind Envoy.
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1-full
    restart: unless-stopped
    profiles: [svc, full]
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-init:
        condition: service_completed_successfully
    command:
      - "mlflow"
      - "server"
      - "--backend-store-uri"
      - "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/mlflow"
      - "--artifacts-destination"
      - "s3://mlflow"
      - "--serve-artifacts"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
      - "--static-prefix"
      - "/mlflow"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://seaweedfs:8333
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-seaweedfs}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-seaweedfs}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    expose:
      - "5000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/mlflow/health')\""
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
