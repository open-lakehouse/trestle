name: databricks-emulator-env
version: 0.1.0
category: app_runtime
provider_of: databricks_apps_contract
display_name: "Databricks app runtime contract"
summary: "DATABRICKS_HOST / TOKEN / forwarded-user env vars apps expect on Databricks."
description: |
  Contributes only environment variables — the set Databricks Apps injects into
  every running app. Wired together with the Envoy URL rewrites elsewhere in the
  stack, this lets app code read `DATABRICKS_HOST`, `DATABRICKS_TOKEN`,
  `MLFLOW_TRACKING_URI`, and the OBO header variables identically in local dev
  and in production.

wire_help:
  - { env: DATABRICKS_HOST, note: "Where the databricks-sdk calls land (Envoy locally)." }
  - { env: DATABRICKS_TOKEN, note: "Dummy local token; replaced on Databricks." }
  - { env: DATABRICKS_FORWARDED_USER, note: "OBO header Envoy injects on upstream requests." }
  - { env: DATABRICKS_FORWARDED_EMAIL, note: "OBO header Envoy injects on upstream requests." }

provides:
  env_vars:
    LOCAL_DEV: "1"
    DATABRICKS_HOST: "http://localhost:${ENVOY_PORT:-9080}"
    DATABRICKS_TOKEN: "local-dev-token-do-not-use-in-prod"
    DATABRICKS_CLIENT_ID: "local-dev"
    DATABRICKS_WORKSPACE_ID: "local"
    DATABRICKS_APP_URL: "http://localhost:${ENVOY_PORT:-9080}"
    DATABRICKS_APP_PORT: "8080"
    DATABRICKS_FORWARDED_USER: "local-developer@example.com"
    DATABRICKS_FORWARDED_EMAIL: "local-developer@example.com"
