name: databricks-app-rust
version: 0.1.0
description: |
  Rust-Axum service ready to deploy to Databricks Apps, with proto-driven code
  generation (server, client, TS bindings) and an optional local stack that
  emulates the Databricks request edge (Envoy + Postgres + MLflow + SeaweedFS).
authors: [trestle]
trestle_min_version: 0.1.0

variables:
  - name: project_name
    prompt: "Project name (kebab-case)"
    validate: "^[a-z][a-z0-9-]*$"
    help: "Used for crate names, Docker images, and the Databricks Apps app name."
  - name: gh_owner
    prompt: "GitHub owner/org (used in Cargo.toml)"
    default: "your-org"
  - name: rust_edition
    default: "2024"
    help: "Rust edition for the workspace."
  - name: with_frontend
    type: bool
    prompt: "Include React+Vite frontend?"
    default: true
  - name: with_ci
    type: bool
    prompt: "Include GitHub Actions CI/CD?"
    default: true
  - name: local_stack
    type: enum
    prompt: "Local platform stack (emulates Databricks)"
    options: [none, db, dbx-emulator, lakehouse, full]
    default: dbx-emulator
    help: "What to bring up with `just up`. `dbx-emulator` is the recommended starting point."
  - name: license
    type: enum
    prompt: "License"
    options: [Apache-2.0, MIT, none]
    default: Apache-2.0

profiles:
  none: []
  db:
    - local-stack-postgres
  dbx-emulator:
    - local-stack-envoy
    - local-stack-postgres
    - local-stack-seaweedfs
    - local-stack-mlflow
    - databricks-emulator-env
  lakehouse:
    - local-stack-envoy
    - local-stack-postgres
    - local-stack-seaweedfs
    - local-stack-mlflow
    - local-stack-unity-catalog
    - local-stack-notebooks
    - databricks-emulator-env
  full:
    - local-stack-envoy
    - local-stack-postgres
    - local-stack-seaweedfs
    - local-stack-mlflow
    - local-stack-unity-catalog
    - local-stack-notebooks
    - local-stack-jaeger
    - databricks-emulator-env

components:
  # Per-template components (local).
  - { name: frontend-react, kind: local, path: components/frontend-react, when: "with_frontend" }
  - { name: ci-github, kind: local, path: components/ci-github, when: "with_ci" }

  # Shared platform-stack components. Each one's `when:` mirrors the named
  # profiles so `--profile <p>` and individual `--with` selections both work.
  - { name: local-stack-envoy,         kind: shared, when: "local_stack in ['dbx-emulator','lakehouse','full']" }
  - { name: local-stack-postgres,      kind: shared, when: "local_stack != 'none'" }
  - { name: local-stack-seaweedfs,     kind: shared, when: "local_stack in ['dbx-emulator','lakehouse','full']" }
  - { name: local-stack-mlflow,        kind: shared, when: "local_stack in ['dbx-emulator','lakehouse','full']" }
  - { name: local-stack-unity-catalog, kind: shared, when: "local_stack in ['lakehouse','full']" }
  - { name: local-stack-notebooks,     kind: shared, when: "local_stack in ['lakehouse','full']" }
  - { name: local-stack-jaeger,        kind: shared, when: "local_stack == 'full'" }
  - { name: databricks-emulator-env,   kind: shared, when: "local_stack in ['dbx-emulator','lakehouse','full']" }

template_context:
  has_app: true
  app_service_name: "{{ project_name | kebab_case }}-server"
  app_port: 8080

post_init:
  - run: "git init -q && git add -A && git commit -q -m 'chore: scaffolded by trestle' || true"
    confirm: true
    description: "Initialise a fresh git repository"
