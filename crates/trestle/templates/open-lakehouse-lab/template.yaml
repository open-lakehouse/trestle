name: open-lakehouse-lab
version: 0.1.0
description: |
  Local lakehouse playground. Brings up Envoy + Postgres + SeaweedFS + MLflow +
  Unity Catalog + Marimo notebooks behind a single port, wired so the same
  Databricks-shaped URLs work locally and in production. Useful for demos,
  teaching, and prototyping pipelines (delta-rs, iceberg, UC).
authors: [trestle]
trestle_min_version: 0.1.0

variables:
  - name: lab_name
    prompt: "Lab name (kebab-case)"
    validate: "^[a-z][a-z0-9-]*$"
    help: "Used for the compose project name and the default Postgres database."
  - name: stack_profile
    type: enum
    prompt: "Lab profile"
    options: [minimal, lakehouse, full]
    default: lakehouse
    help: "minimal=just Postgres+S3, lakehouse=+MLflow/UC/notebooks, full=+Jaeger"

profiles:
  minimal:
    - local-stack-postgres
    - local-stack-seaweedfs
  lakehouse:
    - local-stack-envoy
    - local-stack-postgres
    - local-stack-seaweedfs
    - local-stack-mlflow
    - local-stack-unity-catalog
    - local-stack-notebooks
    - databricks-emulator-env
  full:
    - local-stack-envoy
    - local-stack-postgres
    - local-stack-seaweedfs
    - local-stack-mlflow
    - local-stack-unity-catalog
    - local-stack-notebooks
    - local-stack-jaeger
    - databricks-emulator-env

components:
  - { name: local-stack-envoy, kind: shared, when: "stack_profile != 'minimal'" }
  - { name: local-stack-postgres, kind: shared }
  - { name: local-stack-seaweedfs, kind: shared }
  - { name: local-stack-mlflow, kind: shared, when: "stack_profile != 'minimal'" }
  - { name: local-stack-unity-catalog, kind: shared, when: "stack_profile != 'minimal'" }
  - { name: local-stack-notebooks, kind: shared, when: "stack_profile != 'minimal'" }
  - { name: local-stack-jaeger, kind: shared, when: "stack_profile == 'full'" }
  - { name: databricks-emulator-env, kind: shared, when: "stack_profile != 'minimal'" }

template_context:
  has_app: false
  app_service_name: ""
  app_port: 8080

post_init:
  - run: "git init -q && git add -A && git commit -q -m 'chore: scaffolded by trestle' || true"
    confirm: true
    description: "Initialise a fresh git repository"
