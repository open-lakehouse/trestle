syntax = "proto3";
package demo.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";

enum Color {
  COLOR_UNSPECIFIED = 0;
  RED = 1;
  GREEN = 2;
}

message Widget {
  // A message-nested enum: buffa/prost nest it under a snake_case module named
  // after the parent message (`widget::Size`), so the PyO3 wrapper and the
  // node/builder enum references must resolve through that path, not the bare leaf
  // name. This is the case that drove the buffa nested-enum path fix.
  enum Size {
    SIZE_UNSPECIFIED = 0;
    SMALL = 1;
    LARGE = 2;
  }

  string name = 1 [(google.api.field_behavior) = IDENTIFIER];
  Color color = 2;
  Size size = 3;
}

message Circle {
  double radius = 1;
}

message Square {
  double side = 1;
}

// A message with a oneof (`shape`) flattening a message variant (`circle`),
// another message variant (`square`), and a scalar variant (`label`). The PyO3
// wrapper constructor must expose one optional kwarg per variant and set the
// oneof accordingly (issue #99); this exercises both the boxed-message and the
// scalar variant write/read paths against real buffa models.
message Shape {
  oneof shape {
    Circle circle = 1;
    Square square = 2;
    string label = 3;
  }
}

message ListWidgetsRequest {
  int32 max_results = 1;
  string page_token = 2;
  Color color = 3;
}

message ListWidgetsResponse {
  repeated Widget widgets = 1;
}

service WidgetService {
  rpc ListWidgets(ListWidgetsRequest) returns (ListWidgetsResponse) {
    option (google.api.http) = { get: "/widgets" };
  }
}
