[package]
name = "olai-store"
description = "Generic, TAO-inspired object and association store with field-role enforcement"
version = "0.0.5"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
homepage.workspace = true
keywords.workspace = true

[dependencies]
# workspace dependencies (in alphabetical order)
async-trait = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# convenience for downstream crates that want to use certain types with sqlx
sqlx = { workspace = true, optional = true, features = [
  "uuid",
  "macros",
  "chrono",
  "json",
] }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[features]
default = []
sqlx = ["dep:sqlx"]

[dev-dependencies]
tokio = { version = "1.29.0", features = ["rt", "macros"] }
# `v4` is only needed by the in-memory test doubles to mint object ids;
# real store backends generate their own ids, so the lib does not need it.
uuid = { version = "1", features = ["v4"] }
