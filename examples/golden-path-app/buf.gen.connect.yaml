# Connect-RPC server facade generation (Step 3 spike).
#
# Separate from the main `buf.gen.yaml` so it doesn't disturb the REST/buffa
# model generation. Reuses the EXISTING buffa models in the common crate (the
# remote buffa plugin already emits the `__buffa::view` types the connect facade
# references) by pointing `buffa_module` at that crate's models module.
version: v2
inputs:
  - directory: proto
plugins:
  - local: protoc-gen-connect-rust
    out: crates/server/src/connect_gen
    opt:
      - buffa_module=::golden_path_app_common::models
  - local: protoc-gen-buffa-packaging
    out: crates/server/src/connect_gen
    strategy: all
    opt:
      - filter=services
