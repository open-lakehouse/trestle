version: v2
inputs:
  - directory: proto
plugins:
  - remote: buf.build/anthropics/buffa:v0.7.0
    out: crates/common/src/models/_gen
    opt:
      - json=true
      - file_per_package=true
  # ConnectRPC server facade. Generated by the remote `connect-rust` plugin
  # (no local toolchain install needed); it emits service traits + routers only,
  # referencing the buffa models above via the absolute `buffa_module` path.
  # `protoc-gen-buffa-packaging` then stitches the per-service `mod.rs` tree.
  - remote: buf.build/anthropics/connect-rust:v0.7.0
    out: crates/server/src/connect_gen
    opt:
      - buffa_module=::golden_path_app_common::models
  - local: protoc-gen-buffa-packaging
    out: crates/server/src/connect_gen
    strategy: all
    opt:
      - filter=services
