# Trestle project config. Generated/edited by `trestle config`.
# `trestle generate -c trestle.yaml` reads this; `buf.gen.yaml` is derived from it.

version: 1
project:
  name: golden-path-app
  id: 356c5627-785e-4b39-a3ea-2596b6446917
generate:
  proto_lib: buffa
  descriptors: api.bin
  servers:
    rest: true
    connect: true
  clients:
    rust:
      output: crates/client/src
      transport: cloud
    node:
      wasm:
        output: crates/client/src
  bindings:
    aggregate_client_name: GoldenPathAppClient
    client_crate_name: golden-path-app-client
    error_base_class: ApiError
    error_code_prefix: GOLDEN_PATH_APP_
  models:
    dir: crates/common/src/models
    crate_name: golden_path_app_common
    path_template: golden_path_app_common::models::{service}::{version}
    path_crate_template: crate::models::{service}::{version}
  server:
    output: crates/server/src
    context_type: crate::api::RequestContext
    result_type: crate::api::Result
    resource_enum: false
    store_integration: false
    object_conversions: false
    resource_clients: false
