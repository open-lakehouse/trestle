# Envoy front-edge config, rendered from aggregated component contributions.
# Route ordering matters: more-specific prefixes must come before less-specific
# ones, so component-provided routes are emitted first and the default app
# route (if any) is emitted last.

static_resources:
  listeners:
    - name: gateway
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                use_remote_address: true
                upgrade_configs:
                  - upgrade_type: websocket
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: all
                      domains: ["*"]
                      routes:
                        # Default route → the user's app (catch-all, must be last).
                        - match: { prefix: "/" }
                          route:
                            cluster: app
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: app
      type: STRICT_DNS
      connect_timeout: 2s
      load_assignment:
        cluster_name: app
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: golden-path-app-server
                      port_value: 8080

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }