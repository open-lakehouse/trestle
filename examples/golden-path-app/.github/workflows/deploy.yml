name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Databricks bundle target (dev / prod)"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.event.inputs.target || 'dev' }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: bufbuild/buf-setup-action@v1

- uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: build server binary
        run: cargo build --release --bin golden-path-app-server

      - name: install databricks cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: authenticate to Databricks (OIDC / workload identity)
        env:
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
        run: |
          databricks auth env-vars > /dev/null

      - name: bundle validate
        run: databricks bundle validate -t ${{ github.event.inputs.target || 'dev' }}

      - name: bundle deploy
        run: databricks bundle deploy -t ${{ github.event.inputs.target || 'dev' }}

      - name: bundle run
        run: databricks bundle run -t ${{ github.event.inputs.target || 'dev' }} golden_path_app

      - name: smoke test /healthz
        run: |
          set -e
          APP_URL=$(databricks apps get golden-path-app -o json | jq -r .url)
          for i in 1 2 3 4 5; do
            if curl -fsS "$APP_URL/healthz" >/dev/null; then
              echo "healthz OK"; exit 0
            fi
            sleep 5
          done
          echo "::error::healthz never became ready"
          exit 1