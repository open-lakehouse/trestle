// RPCs for the driver-facilitation app.
//
// SKETCH — blog narrative material. The `(google.api.http)` annotations declare
// the REST mapping trestle turns into Axum routes + the typed/WASM clients. The
// SAME service definitions back the buf ConnectRPC facade (generated by
// `protoc-gen-connect-rust` against the same buffa models) — one proto, two
// protocols, served on one port.
syntax = "proto3";

package caspers.drivers.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "caspers/drivers/v1/models.proto";

// Driver check-in lifecycle.
service DriverService {
  option (google.api.default_host) = "localhost:8080";

  // A driver checks in as available. Body is the Driver (display_name, vehicle);
  // the server assigns `name`, sets status=AVAILABLE, stamps checked_in_at.
  //   → POST /v1/drivers
  rpc CheckIn(CheckInRequest) returns (Driver) {
    option (google.api.http) = {
      post: "/v1/drivers"
      body: "driver"
    };
  }

  // Fetch one driver by resource name.  → GET /v1/drivers/{uuid}
  rpc GetDriver(GetDriverRequest) returns (Driver) {
    option (google.api.http) = {get: "/v1/{name=drivers/*}"};
  }

  // List drivers (ops dashboard: who's available right now).  → GET /v1/drivers
  rpc ListDrivers(ListDriversRequest) returns (ListDriversResponse) {
    option (google.api.http) = {get: "/v1/drivers"};
  }

  // State transition: the driver checks out (status → OFF). A custom POST verb on
  // the resource — the shape used for non-CRUD actions.
  //   → POST /v1/drivers/{uuid}:checkOut
  rpc CheckOut(CheckOutRequest) returns (Driver) {
    option (google.api.http) = {
      post: "/v1/{name=drivers/*}:checkOut"
      body: "*"
    };
  }
}

// Orders, assigned to drivers (Order is a child of Driver).
service OrderService {
  option (google.api.default_host) = "localhost:8080";

  // Assign a pending order to an available driver (sets driver status=ON_DELIVERY,
  // order status=ASSIGNED).  → POST /v1/drivers/{driver}/orders
  rpc AssignOrder(AssignOrderRequest) returns (Order) {
    option (google.api.http) = {
      post: "/v1/{driver_name=drivers/*}/orders"
      body: "order"
    };
  }

  // List a driver's orders.  → GET /v1/drivers/{driver}/orders
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {get: "/v1/{driver_name=drivers/*}/orders"};
  }
}

message CheckInRequest {
  Driver driver = 1 [(google.api.field_behavior) = REQUIRED];
}

message GetDriverRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message ListDriversRequest {
  int32 max_results = 1;
  string page_token = 2;
}

message ListDriversResponse {
  repeated Driver drivers = 1;
  string next_page_token = 2;
}

message CheckOutRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message AssignOrderRequest {
  // Parent driver-scoping field. Carries the child-type reference that makes
  // Order a child of Driver — this `child_type` edge is what trestle scans to
  // build the (Driver → Order) hierarchy and the `driver.assign_order(..)` /
  // `driver.order(name)` scoped-client navigation.
  string driver_name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "caspers.io/Order"}
  ];
  Order order = 2 [(google.api.field_behavior) = REQUIRED];
}

message ListOrdersRequest {
  string driver_name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "caspers.io/Order"}
  ];
  int32 max_results = 2;
  string page_token = 3;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  string next_page_token = 2;
}
