# Coverage is reported but never blocks a PR while it beds in. Both project and
# patch statuses are informational, so a coverage drop shows up in the Codecov
# comment/status without turning the check red. Tighten (drop `informational`,
# add a `target`) once a baseline is trusted.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Public-repo tokenless upload; require_ci_to_pass off so the report posts even
# when an unrelated CI job is red.
codecov:
  require_ci_to_pass: false

comment:
  layout: "reach, diff, flags, files"
  behavior: default

# Exclude code we never want counted against coverage. The big skew is committed
# codegen output: prost/tonic descriptors under `olai-codegen/src/gen` are
# thousands of machine-generated lines (every file carries a `DO NOT EDIT`
# header) that tests never exercise directly, which drags the denominator down
# and makes the percentage meaningless.
#
# NOTE: `olai-codegen/src/codegen` is deliberately NOT ignored — that tree is the
# hand-written template logic that *emits* generated code, so it is real library
# source and should be measured.
#
# The `examples/` and `crates/trestle/templates/` trees are rendered scaffolding
# (`trestle generate` output / template inputs), and the golden `_gen` fixtures
# under olai-codegen/tests are codegen snapshots — none are hand-written, so they
# must not count. Test harnesses and benches are exercised by running them, not
# by assertions.
#
# Paths are matched against the report's workspace-relative file paths; keep this
# in sync with the `--ignore-filename-regex` in the `coverage` CI job so the
# uploaded artifact and the server-side view agree.
ignore:
  - "crates/olai-codegen/src/gen/**" # prost/tonic descriptor output
  - "crates/olai-codegen/tests/golden/**" # codegen golden-output snapshots
  - "crates/olai-codegen/tests/golden_buffa/**"
  - "crates/trestle/templates/**" # scaffolding template inputs
  - "examples/**" # rendered `trestle generate` output
  - "**/tests/**" # integration test harnesses
  - "**/benches/**"
