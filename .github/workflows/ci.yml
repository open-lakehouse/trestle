name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE: "ci"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.87"
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.87"
          components: clippy
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo clippy --locked --all-targets --features olai-store/sqlx -- -D warnings
      - run: cargo clippy --locked --all-targets --features olai-http/recording -- -D warnings

  machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Scope to `crates/` (the library code). The `examples/` tree is a rendered
      # template whose deps are all used only after `trestle generate` runs; the
      # generated code isn't scanned here, so machete would false-positive on it.
      # Excluding it centrally keeps the example's Cargo.toml honest (no fake
      # ignore-lists that would mislead users who render the template).
      - uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2
        with:
          args: crates

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.87"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        id: stable-toolchain
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Install cargo-msrv
        run: cargo +stable install cargo-msrv --locked
      - name: Verify MSRV (olai-store)
        run: cargo msrv verify --manifest-path crates/olai-store/Cargo.toml -- cargo check --locked
      - name: Verify MSRV (olai-http)
        run: cargo msrv verify --manifest-path crates/olai-http/Cargo.toml -- cargo check --locked
      - name: Verify MSRV (olai-codegen)
        run: cargo msrv verify --manifest-path crates/olai-codegen/Cargo.toml -- cargo check --locked

  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.87"
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Run tests (default features)
        run: cargo test --locked --lib --tests
      - name: Run tests (olai-store sqlx feature)
        run: cargo test --locked --lib --tests -p olai-store --features sqlx
      - name: Run tests (olai-http recording feature)
        run: cargo test --locked --lib --tests -p olai-http --features recording

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    # The workflow-level env sets RUSTC_WRAPPER=sccache, but this job uses
    # Swatinem/rust-cache instead of installing sccache (instrument-coverage
    # builds don't cache usefully through sccache). Unset the wrapper so cargo
    # doesn't fail trying to exec a binary that isn't on PATH.
    env:
      RUSTC_WRAPPER: ""
      SCCACHE_GHA_ENABLED: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.87"
          components: llvm-tools-preview
      # Coverage recompiles with -C instrument-coverage, so it cannot reuse the
      # sccache-backed "ci" caches used by the other jobs — give it its own key.
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          shared-key: coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: cargo-llvm-cov
      # Accumulate coverage across the same feature combinations the `test` job
      # exercises (default + the two opt-in features), then emit one merged
      # report. `--no-report` collects raw profdata; the final `report` step
      # writes codecov.json. Doctests are disabled workspace-wide (see
      # CLAUDE.md), so there is no separate doctest pass.
      #
      # `--ignore-filename-regex` drops committed prost output (olai-codegen/src/gen)
      # and the golden/scaffolding/example trees from the report itself, mirroring
      # codecov.yml's `ignore`. Keep the two in sync. Note `src/codegen` is the
      # hand-written template logic and is intentionally NOT excluded.
      - name: Collect coverage
        run: |
          cargo llvm-cov --no-report --locked --lib --tests
          cargo llvm-cov --no-report --locked --lib --tests -p olai-store --features sqlx
          cargo llvm-cov --no-report --locked --lib --tests -p olai-http --features recording
          cargo llvm-cov report --codecov --output-path codecov.json \
            --ignore-filename-regex 'olai-codegen/src/(\./)?gen/|olai-codegen/tests/golden|/templates/|/examples/'
      # Authenticate with the repository upload token (CODECOV_TOKEN secret).
      # Never fails CI on a flaky upload, and codecov.yml keeps the status
      # informational so it can't block a PR.
      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: codecov.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-release:
    name: Build / release / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.87"
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - run: cargo build --locked --release --all-targets

  example:
    name: Golden-path example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
      # `examples/golden-path-app` is `connect=on`, so it needs trestle (this
      # working tree) + the local connect/buffa codegen plugins.
      - name: Install trestle + codegen plugins
        run: |
          cargo install --path crates/trestle --bin trestle --locked
          # The `protoc-gen-connect-rust` binary ships in the `connectrpc-codegen`
          # crate (the crate literally named `protoc-gen-connect-rust` is empty).
          cargo install --locked connectrpc-codegen protoc-gen-buffa protoc-gen-buffa-packaging
      # Regenerate everything the committed example ships, then prove it neither
      # diverges nor breaks. The committed deps are the published versions (the
      # registry has them; a developer's proxy may lag, hence local path-dep +
      # revert-before-push — see examples/golden-path-app/Cargo.toml).
      - name: Regenerate the example
        working-directory: examples/golden-path-app
        run: |
          buf dep update
          buf generate
          buf build -o api.bin
          trestle generate -c trestle.yaml
      - name: Apply the post-codegen pass (clippy --fix + fmt)
        working-directory: examples/golden-path-app
        run: |
          cargo clippy --fix --allow-dirty --allow-staged --workspace --all-targets || true
          cargo fmt
      - name: Assert the committed example does not diverge
        working-directory: examples/golden-path-app
        run: |
          git diff --exit-code -- . ':(exclude)api.bin' || {
            echo "::error::The committed example diverges from a fresh regen + clippy-fix + fmt. Run 'just regen' in examples/golden-path-app and commit the result."
            exit 1
          }
      - name: Build + lint the example
        working-directory: examples/golden-path-app
        run: |
          cargo build --workspace
          cargo clippy --all-targets -- -D warnings
