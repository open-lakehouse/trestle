name: Bootstrap publish (one-shot)

# ONE-TIME bootstrap to create never-published crate names on crates.io.
# crates.io OIDC trusted publishing cannot publish a name that has never
# existed, so this job does the first publish with a CARGO_REGISTRY_TOKEN.
#
# Scope: this publishes `olai-testle`. `olai-http-wasm` was already bootstrapped
# (it exists on crates.io now). `olai-testle` was deferred because its code uses
# olai-codegen APIs not in the published olai-codegen 0.0.1, and `cargo publish`
# builds against the crates.io copy. olai-codegen 0.0.2 is now published, so
# olai-testle builds and can be bootstrapped.
#
# After this run (the last new name), finish decommissioning:
#   1. Remove `release = false` from olai-testle in release-plz.toml (separate PR)
#      so release-plz manages it via OIDC going forward.
#   2. Register Trusted Publishing for olai-testle on crates.io
#      (repo open-lakehouse/trestle, workflow release-plz.yml, environment release).
#   3. Delete this workflow file.
#   4. Delete the CARGO_REGISTRY_TOKEN repository secret.
# Steady-state releases are handled by release-plz.yml via OIDC (no token).
#
# Manual trigger only — never runs automatically, so it can't race release-plz.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package only, do not actually publish"
        type: boolean
        default: true

permissions: {}

jobs:
  bootstrap-publish:
    name: Bootstrap publish new crates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release # reuse the protected release environment
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.87"

      # olai-testle depends on olai-codegen, now published at 0.0.2 (its dep
      # requirement was synced to 0.0.2 by the release PR), so it builds against
      # the crates.io copy. --locked keeps the artifact reproducible against the
      # committed Cargo.lock.
      - name: Publish olai-testle
        run: |
          cargo publish -p olai-testle --locked \
            ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          # zizmor: ignore[use-trusted-publishing] — intentional: OIDC trusted
          # publishing cannot create a never-before-published crate name. This
          # one-shot token bootstrap is removed once the name exists.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
