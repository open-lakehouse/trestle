name: Bootstrap publish

# One-time, manual first publish of a brand-new crate to crates.io.
#
# crates.io trusted publishing (OIDC) — what release-plz.yml uses for every
# normal release — CANNOT create a crate name that does not exist yet: there is
# no crate to attach a Trusted Publisher policy to. A new publishable crate
# therefore needs exactly one token-authenticated `cargo publish` to create the
# name; after that, the maintainer registers the Trusted Publisher and OIDC
# takes over for all subsequent releases.
#
# This workflow performs that single bootstrap step on demand. Run it ONCE per
# new crate, then never again for that crate. See CONTRIBUTING.md
# ("crates.io authentication") for the full flow.

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Package name to bootstrap-publish (e.g. olai-stack-topology)"
        required: true
        type: string
      dry_run:
        description: "Run `cargo publish --dry-run` only (no upload)"
        required: false
        type: boolean
        default: true

# Least privilege: nothing at the top level.
permissions: {}

jobs:
  bootstrap-publish:
    name: Bootstrap publish ${{ inputs.crate }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Same protected environment as the OIDC release job. CARGO_REGISTRY_TOKEN
    # (a crates.io token with publish-new scope) is stored here, scoped to this
    # environment so it is unavailable to ordinary CI.
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.87"
      # The crate name is passed through `env` and referenced as a shell
      # variable (never expanded into the `run:` template) to avoid script
      # injection via the workflow input.
      - name: Publish (dry-run)
        if: ${{ inputs.dry_run }}
        env:
          CRATE: ${{ inputs.crate }}
        run: cargo publish -p "$CRATE" --dry-run --locked
      - name: Publish (bootstrap)
        if: ${{ !inputs.dry_run }}
        env:
          CRATE: ${{ inputs.crate }}
          # zizmor: ignore[use-trusted-publishing] — bootstrapping the crate
          # name is the one publish OIDC cannot do; token auth is required here.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p "$CRATE" --locked
