name: Release binaries

# Builds the `trestle` CLI for each supported target and attaches the archives
# (+ SHA-256 checksums + SLSA build-provenance attestations) to the GitHub
# Release that release-plz publishes for each `olai-trestle-v*` tag. This makes
# `cargo binstall olai-trestle` download a prebuilt binary instead of compiling
# from source. The binstall URL/layout is pinned in crates/trestle/Cargo.toml
# (`[package.metadata.binstall]`) and MUST stay in sync with the `archive` /
# `leading-dir` settings below.
#
# How this runs:
#   Primary trigger is `workflow_call` from release-plz.yml. When release-plz
#   releases (tags + GitHub-Releases) a new `olai-trestle` version, it calls this
#   workflow with that version + the release tag to build from. Running it inline
#   as a downstream job keeps the build explicitly gated on "the CLI was released
#   this run" and passes the tag in directly — no `release:` trigger to reason
#   about (release-plz creates the Release with the default GITHUB_TOKEN, whose
#   events cannot start a new workflow run), and no re-discovery of the freshly-
#   created release. `workflow_dispatch` remains for manual rebuilds against an
#   existing tag (e.g. a toolchain refresh).

on:
  workflow_call:
    inputs:
      tag:
        description: "Git tag to build from (the release-plz tag, e.g. olai-trestle-v0.3.1). The archive/asset layout derives from this; there is no separate version input."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing olai-trestle-v* tag to build + attach assets to."
        required: true
        type: string

# Least privilege: nothing at the top level.
permissions: {}

# Both triggers provide `inputs.tag`; key concurrency off it so re-runs against
# the same tag supersede each other.
concurrency:
  group: release-binaries-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  upload-binaries:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # Protected environment mirrors the release-plz job boundary. No secrets are
    # consumed here (attestations use OIDC), but keeping the boundary consistent
    # guards future signing credentials.
    environment: release
    permissions:
      contents: write # attach assets to the existing GitHub Release
      id-token: write # OIDC for build-provenance attestations
      attestations: write # write the attestation to the attestations store
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Build the exact commit the release tag points at, not the branch tip.
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.88"
          targets: ${{ matrix.target }}
      # Build (release profile from the workspace), package as
      # `trestle-<target>.tar.gz` with a `trestle-<target>/` leading dir (matches
      # the binstall `bin-dir` template), emit a `.sha256`, and upload both to the
      # release identified by `ref`. The action attaches to the existing release
      # — it does not create one.
      - name: Build + upload
        id: upload
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: trestle
          target: ${{ matrix.target }}
          archive: trestle-$target
          leading-dir: true
          checksum: sha256
          include: LICENSE,README.md
          # This action requires a *fully-formed* tag ref (checkout above takes
          # the bare tag). Since we run from workflow_call/workflow_dispatch — not
          # a tag/release event — we must pass it explicitly.
          ref: refs/tags/${{ inputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
      # Key-free SLSA build provenance over the archive + checksum, verifiable
      # with `gh attestation verify <archive> --repo <owner>/<repo>`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ steps.upload.outputs.tar }}
            ${{ steps.upload.outputs.sha256 }}
