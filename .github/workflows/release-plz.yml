name: Release-plz

# Automated releases. On every push to `main`, release-plz opens/updates a
# single "Release PR" containing per-crate version bumps + regenerated
# changelogs. When that PR is merged, release-plz creates the per-crate git
# tags + GitHub Releases and publishes to crates.io (OIDC trusted publishing).
#
# When that run releases the `olai-trestle` CLI crate, a downstream
# `release-binaries` job (a `workflow_call` into release-binaries.yml) builds the
# prebuilt CLI binaries and attaches them to the release. It is gated on the CLI
# actually being released this run — the version + tag come straight from
# release-plz's `releases` output, so there is no second trigger or re-discovery.
# See CONTRIBUTING.md for the full flow.

on:
  push:
    branches:
      - main

# Least privilege: grant per job, nothing at the top level.
permissions: {}

jobs:
  # --- Open/update the Release PR (version bumps + changelogs) ---
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the release-plz-* branch
      pull-requests: write # create/update the Release PR
    # Avoid two pushes to main racing to open/update the same PR.
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # release-plz needs full history to analyze commits
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.88"
      - name: Run release-plz (release-pr)
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Tag + GitHub Release + cargo publish, after the Release PR is merged ---
  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release # protected env (mirrors the previous release workflow)
    permissions:
      contents: write # create tags + GitHub Releases
      id-token: write # crates.io OIDC trusted publishing
    outputs:
      # olai-trestle version + tag IF this run released the CLI crate, else empty
      # — the release-binaries job keys off this.
      cli_version: ${{ steps.cli.outputs.version }}
      cli_tag: ${{ steps.cli.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.88"
      - name: Run release-plz (release)
        id: release
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # release-plz's `release` command emits a `releases` JSON array of the
      # crates it released this run ({ package_name, version, tag, ... }). If
      # `olai-trestle` is among them, surface its version + tag so the downstream
      # `release-binaries` job fires and builds the prebuilt CLI archives. When
      # the CLI was not released (no bump, or a re-run), the outputs stay empty
      # and that job is skipped — idempotent by design.
      - name: Extract olai-trestle release
        id: cli
        env:
          RELEASES: ${{ steps.release.outputs.releases }}
        run: |
          set -euo pipefail
          # `releases` is empty when nothing was released this run.
          if [ -z "${RELEASES:-}" ]; then
            echo "No releases this run — skipping CLI binaries."
            exit 0
          fi
          entry="$(jq -c '[.[] | select(.package_name == "olai-trestle")][0] // empty' <<< "$RELEASES")"
          if [ -z "$entry" ]; then
            echo "olai-trestle not released this run — skipping CLI binaries."
            exit 0
          fi
          version="$(jq -r '.version' <<< "$entry")"
          tag="$(jq -r '.tag' <<< "$entry")"
          echo "olai-trestle ${version} released (tag ${tag}) → building CLI binaries."
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  # --- Build + attach the prebuilt CLI binaries, iff olai-trestle was released ---
  release-binaries:
    name: Release binaries
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.cli_version != '' }}
    # A called workflow cannot exceed the caller job's permissions; grant exactly
    # what upload-binaries needs (attach assets + OIDC attestations).
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release-binaries.yml
    with:
      tag: ${{ needs.release-plz-release.outputs.cli_tag }}

  # --- Update the Homebrew formula in open-lakehouse/homebrew-tap, iff the CLI
  #     was released AND its prebuilt binaries were attached this run ---
  bump-homebrew:
    name: Bump Homebrew formula
    needs: [release-plz-release, release-binaries]
    if: ${{ needs.release-plz-release.outputs.cli_version != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release # where HOMEBREW_TAP_APP_* secrets live
    # Only read access here; the cross-repo write happens with the App token
    # minted below, scoped to homebrew-tap — never the workflow's GITHUB_TOKEN.
    permissions:
      contents: read
    steps:
      # Need the generator script from this repo at the released tag.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-plz-release.outputs.cli_tag }}
          persist-credentials: false
      # Mint a short-lived token scoped to the tap repo (App installed there).
      # No long-lived PAT; the default GITHUB_TOKEN cannot touch another repo.
      # The bot only ever *proposes* a formula change (branch + PR) — it does not
      # write `main` — so a compromised App key cannot silently mutate a formula;
      # a tap maintainer still reviews the PR. That requires pull-requests:write
      # in addition to contents:write (to push the PR branch).
      - name: Mint tap token
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap
          # Narrow the minted token to exactly what opening a PR needs.
          permission-contents: write
          permission-pull-requests: write
      # Pull the .sha256 sidecars the release-binaries job just attached, then
      # render the formula (standalone file — we write it to the tap through the
      # API below, so no tap checkout is needed).
      - name: Render formula
        env:
          GH_TOKEN: ${{ github.token }} # read-only, for `gh release download`
          TAG: ${{ needs.release-plz-release.outputs.cli_tag }}
          VERSION: ${{ needs.release-plz-release.outputs.cli_version }}
        run: |
          set -euo pipefail
          sums="$(mktemp -d)"
          gh release download "$TAG" --repo "${{ github.repository }}" \
            --dir "$sums" --pattern '*.sha256'
          scripts/gen-homebrew-formula.sh \
            --tool trestle --crate olai-trestle --version "$VERSION" \
            --repo "${{ github.repository }}" --tag-prefix olai-trestle-v \
            --desc "Unified CLI for proto-driven code generation and full-project scaffolding" \
            --homepage "https://github.com/${{ github.repository }}" \
            --checksums-dir "$sums" > trestle.rb
      # Propose the update as a PR against the tap — never a direct push to main.
      # Commit through the GitHub Contents API (not `git`): API-authored commits
      # are signed by GitHub automatically, satisfying the tap's required-signed-
      # commits rule, which a plain `git push` from CI cannot. Branch name is
      # version-stable so a re-run updates the same PR instead of duplicating it.
      - name: Propose formula update via PR
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          TAP: ${{ github.repository_owner }}/homebrew-tap
          VERSION: ${{ needs.release-plz-release.outputs.cli_version }}
        run: |
          set -euo pipefail
          path="Formula/trestle.rb"
          branch="bump-trestle-${VERSION}"

          # Skip if the tap's main already has this exact content.
          new_b64="$(base64 -w0 < trestle.rb)"
          cur_b64="$(gh api "repos/${TAP}/contents/${path}?ref=main" --jq '.content' 2>/dev/null | tr -d '\n' || true)"
          cur_sha="$(gh api "repos/${TAP}/contents/${path}?ref=main" --jq '.sha' 2>/dev/null || true)"
          norm() { tr -d '\n'; }
          if [ -n "$cur_b64" ] && [ "$(printf %s "$new_b64" | norm)" = "$(printf %s "$cur_b64" | norm)" ]; then
            echo "Formula already up to date on main — nothing to propose."
            exit 0
          fi

          # Point the PR branch at main's head, creating or fast-forwarding it.
          base_sha="$(gh api "repos/${TAP}/git/ref/heads/main" --jq '.object.sha')"
          if gh api "repos/${TAP}/git/ref/heads/${branch}" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${TAP}/git/refs/heads/${branch}" \
              -f sha="$base_sha" -F force=true >/dev/null
          else
            gh api -X POST "repos/${TAP}/git/refs" \
              -f ref="refs/heads/${branch}" -f sha="$base_sha" >/dev/null
          fi

          # Commit the file onto the branch via the Contents API (GitHub signs it).
          # Look up the file's blob sha *on the branch* for the update case.
          br_sha="$(gh api "repos/${TAP}/contents/${path}?ref=${branch}" --jq '.sha' 2>/dev/null || true)"
          args=(-f message="trestle ${VERSION}" -f content="$new_b64" -f branch="$branch")
          [ -n "$br_sha" ] && args+=(-f sha="$br_sha")
          gh api -X PUT "repos/${TAP}/contents/${path}" "${args[@]}" >/dev/null

          # Open the PR if one isn't already open for this branch.
          if [ -z "$(gh pr list --repo "$TAP" --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create --repo "$TAP" --base main --head "$branch" \
              --title "trestle ${VERSION}" \
              --body "Automated formula bump for \`olai-trestle-v${VERSION}\`. Generated by the release pipeline; review the URL + sha256 before merging."
          fi
